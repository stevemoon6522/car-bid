{% extends "base.html" %}
{% block title %}입찰 차량 입력 — 중고차 입찰가 추정기{% endblock %}
{% block content %}
<h1>입찰 차량 정보 입력</h1>
<p class="hint">낙찰 이력에서 유사 차량을 검색해 추천 입찰가를 제시합니다.</p>

<form method="post" action="/search" class="search-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
  <div class="form-row">
    <div class="form-group">
      <label for="car_name">차명 <span class="req">*</span></label>
      <input type="text" id="car_name" name="car_name" list="car-name-list"
             placeholder="예: K5 (입력 시 자동완성)" autocomplete="off" required />
      <datalist id="car-name-list"></datalist>
      <small id="car-name-hint" class="hint-muted">DB에서 차명 후보 로딩 중...</small>
    </div>
    <div class="form-group">
      <label for="model_name">모델명 <span class="req">*</span></label>
      <input type="text" id="model_name" name="model_name" list="model-name-list"
             placeholder="차명 선택 후 모델명 자동완성" autocomplete="off" required />
      <datalist id="model-name-list"></datalist>
      <small id="model-name-hint" class="hint-muted">차명을 먼저 선택하세요.</small>
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="year">년식 <span class="req">*</span></label>
      <input type="number" id="year" name="year" placeholder="예: 2021" min="1990" max="2030" required />
    </div>
    <div class="form-group">
      <label for="mileage_km">주행거리 (km) <span class="req">*</span></label>
      <input type="number" id="mileage_km" name="mileage_km" placeholder="예: 80000" min="0" required />
    </div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="grade_first">사고 등급 <span class="req">*</span></label>
      <select id="grade_first" name="grade_first" required>
        <option value="" disabled selected>등급 선택</option>
        <option value="A">A — 무사고 (교환 이력 없음)</option>
        <option value="B">B — 외관 교환 있음</option>
        <option value="C">C — 일반골격 교환 있음</option>
        <option value="D">D — 주요골격 교환 있음</option>
      </select>
    </div>
    <div class="form-group">
      <label for="color">색상 <span class="req">*</span></label>
      <input type="text" id="color" name="color" placeholder="예: 검정, 흰색, 은색" required />
    </div>
  </div>

  <div class="form-group full-width">
    <label for="options">옵션 (보유 옵션을 쉼표로 구분해 입력)</label>
    <textarea id="options" name="options" rows="3"
      placeholder="예: 네비, 스마트키, 선루프, HID/LED, 어라운드뷰"></textarea>
    <small>선루프 여부가 가격 보정에 사용됩니다. 없으면 비워두세요.</small>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn-primary">검색</button>
  </div>
</form>

<script>
(function () {
  // Fetch the (car_name → [model_names]) index once and populate both datalists.
  // Datalists are native browser autocomplete — typing filters as the user types.
  const carInput   = document.getElementById('car_name');
  const modelInput = document.getElementById('model_name');
  const carList    = document.getElementById('car-name-list');
  const modelList  = document.getElementById('model-name-list');
  const carHint    = document.getElementById('car-name-hint');
  const modelHint  = document.getElementById('model-name-hint');

  let MODELS_BY_CAR = {};

  function populateCarList(cars) {
    carList.innerHTML = '';
    cars.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      carList.appendChild(opt);
    });
    carHint.textContent = `차명 ${cars.length}개 로딩 완료 — 입력하면 자동완성됩니다.`;
  }

  function populateModelList(carName) {
    modelList.innerHTML = '';
    const models = MODELS_BY_CAR[carName] || [];
    if (models.length === 0) {
      modelHint.textContent = '해당 차명에 매칭되는 모델명 없음 — 차명을 다시 확인하세요.';
      return;
    }
    models.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      modelList.appendChild(opt);
    });
    modelHint.textContent = `모델명 ${models.length}개 — 입력하면 자동완성됩니다.`;
  }

  carInput.addEventListener('input', () => {
    const v = carInput.value.trim();
    if (v && MODELS_BY_CAR[v]) {
      populateModelList(v);
    }
  });
  carInput.addEventListener('change', () => {
    const v = carInput.value.trim();
    if (v && MODELS_BY_CAR[v]) populateModelList(v);
  });

  fetch('/api/index', { credentials: 'same-origin' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      MODELS_BY_CAR = data.models || {};
      populateCarList(data.cars || []);
    })
    .catch(e => {
      carHint.textContent = '자동완성 로딩 실패: ' + e.message + ' — 수동 입력 가능';
    });
})();
</script>
{% endblock %}
